description: Vango Technologies V32F20X I2S Controller
compatible: "vango,v32f20x-i2s"
include: [i2s-controller.yaml, pinctrl-device.yaml]
properties:
  reg:
    required: true
  interrupts:
    required: true
  clocks:
    type: phandle-array
    required: true
  resets:
    type: phandle-array
    required: true
