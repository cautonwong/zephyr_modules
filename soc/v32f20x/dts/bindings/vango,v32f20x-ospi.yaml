description: Vango Technologies V32F20X OSPI Controller
compatible: "vango,v32f20x-ospi"
include: [spi-controller.yaml, pinctrl-device.yaml]
properties:
  reg:
    required: true
  interrupts:
    required: true
  clocks:
    type: phandle-array
    required: true
  resets:
    type: phandle-array
    required: true
