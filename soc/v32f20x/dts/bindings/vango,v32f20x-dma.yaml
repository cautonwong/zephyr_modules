description: Vango Technologies V32F20X DMA Controller

compatible: "vango,v32f20x-dma"

include: [dma-controller.yaml, base.yaml]

properties:
  reg:
    type: array
    required: false
  interrupts:
    type: array
    required: false
  dma-channels:
    type: int
    required: false
    description: Number of DMA channels (8 for DMA0/1, 4 for BDMA)
  clocks:
    type: phandle-array
    required: false
  resets:
    type: phandle-array
    required: false
  "#dma-cells":
    type: int
    const: 2

dma-cells:
  - channel
  - slot
