description: Vango Technologies V32F20X UART

compatible: "vango,v32f20x-uart"

include: [uart-controller.yaml, pinctrl-device.yaml, base.yaml]

properties:
  reg:
    required: false
  interrupts:
    required: false
  clocks:
    type: phandle-array
    required: false
  resets:
    type: phandle-array
    required: false
