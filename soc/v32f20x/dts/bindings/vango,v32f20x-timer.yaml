description: Vango Technologies V32F20X Timer
compatible: "vango,v32f20x-timer"
include: [base.yaml, pinctrl-device.yaml]
properties:
  reg:
    type: array
    required: true
  interrupts:
    type: array
    required: true
  clocks:
    type: phandle-array
    required: true
  resets:
    type: phandle-array
    required: true
