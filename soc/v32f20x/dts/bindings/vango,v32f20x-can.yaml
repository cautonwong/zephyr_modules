description: Vango Technologies V32F20X CAN Controller

compatible: "vango,v32f20x-can"

include: [can-controller.yaml, pinctrl-device.yaml]

properties:
  reg:
    required: true
  interrupts:
    required: true
  clocks:
    type: phandle-array
    required: true
  resets:
    type: phandle-array
    required: true
  bus-speed:
    type: int
