description: Vango Technologies V32F20X GPIO Controller

compatible: "vango,v32f20x-gpio"

include: [gpio-controller.yaml, base.yaml]

properties:
  reg:
    type: array
    required: true
  interrupts:
    type: array
    required: false
  clocks:
    type: phandle-array
    required: false
  resets:
    type: phandle-array
    required: false
  ngpios:
    type: int
    required: true
  "#gpio-cells":
    type: int
    const: 2

gpio-cells:
  - pin
  - flags
