description: Vango Technologies V32F20X Pinctrl
compatible: "vango,v32f20x-pinctrl"
include: [base.yaml]
properties:
  reg:
    type: array
    required: true

child-binding:
  description: Vango Technologies V32F20X pin configuration node
  include: [pinctrl-device.yaml]
  child-binding:
    description: Vango Technologies V32F20X pin configuration group
    properties:
      pinmux:
        required: true
        type: array
      bias-pull-up:
        type: boolean
      bias-pull-down:
        type: boolean
      drive-open-drain:
        type: boolean
