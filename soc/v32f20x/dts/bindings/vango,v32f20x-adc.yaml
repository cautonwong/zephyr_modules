description: Vango Technologies V32F20X ADC

compatible: "vango,v32f20x-adc"

include: [adc-controller.yaml, base.yaml]

properties:
  reg:
    type: array
    required: false
  interrupts:
    type: array
    required: false
  clocks:
    type: phandle-array
    required: false
  resets:
    type: phandle-array
    required: false
  "#io-channel-cells":
    type: int
    const: 1
