description: Vango Technologies V32F20X ADC

compatible: "vango,v32f20x-adc"

# Professional Practice: Inherit from standard Zephyr ADC controller
include: [adc-controller.yaml, base.yaml]

properties:
  reg:
    type: array
    required: true
  interrupts:
    type: array
    required: true
  clocks:
    type: phandle-array
    required: true
  resets:
    type: phandle-array
    required: true
  "#io-channel-cells":
    type: int
    const: 1
