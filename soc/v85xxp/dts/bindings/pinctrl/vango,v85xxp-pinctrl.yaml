description: Vango V85XXP Pinctrl
compatible: "v85xxp,pinctrl"
include: [base.yaml]
properties:
    reg:
      required: true

child-binding:
  description: Vango V85XXP pin configuration node
  include: [pinctrl-device.yaml]
  child-binding:
    description: Vango V85XXP pin configuration group
    properties:
      pinmux:
        required: true
        type: array
      bias-pull-up:
        type: boolean
      bias-pull-down:
        type: boolean
